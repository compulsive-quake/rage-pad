<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <svg class="logo" viewBox="0 0 24 24" width="48" height="48">
        <path fill="currentColor" d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
      </svg>
      <h1>RagePad</h1>
      <p class="subtitle">{{ isRegisterMode ? 'Create your account' : 'Sign in to continue' }}</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="storeUrl">Store Server</label>
        <input
          id="storeUrl"
          type="url"
          [(ngModel)]="storeServerUrl"
          name="storeUrl"
          placeholder="http://localhost:9090"
          autocomplete="off"
        />
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="Enter your username"
          autocomplete="username"
          autofocus
        />
      </div>

      <div class="form-group" *ngIf="isRegisterMode">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Enter your email"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
        />
      </div>

      <div class="form-group" *ngIf="isRegisterMode">
        <label for="confirmPassword">Confirm Password</label>
        <input
          id="confirmPassword"
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="Confirm your password"
          autocomplete="new-password"
        />
      </div>

      <div class="error-message" *ngIf="error">
        {{ error }}
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">{{ isRegisterMode ? 'Register' : 'Sign In' }}</span>
        <span *ngIf="isLoading">{{ isRegisterMode ? 'Registering...' : 'Signing in...' }}</span>
      </button>
    </form>

    <div class="login-footer">
      <button class="btn-toggle" (click)="toggleMode()">
        {{ isRegisterMode ? 'Already have an account? Sign in' : "Don't have an account? Register" }}
      </button>
    </div>
  </div>
</div>
