<div class="profile-page">
  <div class="profile-header">
    <button class="back-btn" (click)="close()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
      </svg>
      <span>Back</span>
    </button>
    <h2>Profile Settings</h2>
  </div>

  <div class="profile-body">
    <!-- Profile Picture Section -->
    <div class="section">
      <h3>Profile Picture</h3>
      <div class="profile-picture-section">
        <div class="profile-picture-large">
          <img *ngIf="user?.profilePicture" [src]="profilePictureUrl" alt="Profile picture" />
          <svg *ngIf="!user?.profilePicture" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="default-avatar-large">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
          </svg>
        </div>
        <div class="profile-picture-actions">
          <label class="btn btn-primary upload-btn">
            <span *ngIf="!pictureSaving">Upload Picture</span>
            <span *ngIf="pictureSaving">Uploading...</span>
            <input type="file" accept="image/*" (change)="onProfilePictureSelected($event)" hidden [disabled]="pictureSaving" />
          </label>
          <button class="btn btn-secondary" *ngIf="user?.profilePicture" (click)="removeProfilePicture()" [disabled]="pictureSaving">
            Remove
          </button>
        </div>
        <p class="error-text" *ngIf="pictureError">{{ pictureError }}</p>
      </div>
    </div>

    <!-- Email Section -->
    <div class="section">
      <h3>Email</h3>
      <div class="form-group">
        <input type="email" [(ngModel)]="email" placeholder="Email address" class="input" />
        <button class="btn btn-primary" (click)="saveEmail()" [disabled]="emailSaving">
          <span *ngIf="!emailSaving">Save</span>
          <span *ngIf="emailSaving">Saving...</span>
        </button>
      </div>
      <p class="success-text" *ngIf="emailSuccess">{{ emailSuccess }}</p>
      <p class="error-text" *ngIf="emailError">{{ emailError }}</p>
    </div>

    <!-- Password Section -->
    <div class="section">
      <h3>Change Password</h3>
      <div class="form-stack">
        <input type="password" [(ngModel)]="currentPassword" placeholder="Current password" class="input" />
        <input type="password" [(ngModel)]="newPassword" placeholder="New password" class="input" />
        <input type="password" [(ngModel)]="confirmPassword" placeholder="Confirm new password" class="input" />
        <button class="btn btn-primary" (click)="savePassword()" [disabled]="passwordSaving">
          <span *ngIf="!passwordSaving">Update Password</span>
          <span *ngIf="passwordSaving">Updating...</span>
        </button>
      </div>
      <p class="success-text" *ngIf="passwordSuccess">{{ passwordSuccess }}</p>
      <p class="error-text" *ngIf="passwordError">{{ passwordError }}</p>
    </div>

    <!-- Logout Section -->
    <div class="section logout-section">
      <button class="btn btn-logout" (click)="logout()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
        </svg>
        Logout
      </button>
    </div>
  </div>
</div>
