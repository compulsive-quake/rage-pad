name: Build Android APK

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Build Angular app
        run: cd client && npx ng build --configuration production

      - name: Sync Capacitor
        run: cd client && npx cap sync android

      - name: Make gradlew executable
        run: chmod +x client/android/gradlew

      - name: Build APK
        run: cd client/android && ./gradlew assembleRelease

      - name: Rename APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cp client/android/app/build/outputs/apk/release/app-release-unsigned.apk "RagePad-${VERSION}.apk"
          echo "APK_NAME=RagePad-${VERSION}.apk" >> $GITHUB_ENV

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ env.APK_NAME }}

      - name: Upload APK to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ env.APK_NAME }}"
